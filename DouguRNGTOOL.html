<html>
<head>
    <link rel="apple-touch-icon" href="Clipboard 2026:04:20 13.26.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        :root {
            --bg: #000000; --card: #1c1c1e; --accent: #0a84ff;
            --secondary: #5e5ce6; --success: #34c759; --danger: #ff453a;
            --text: #ffffff; --sub-text: #8e8e93;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text);
            margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh;
        }
        button { touch-action: manipulation; cursor: pointer; border: none; }
        
        .header { background: #2c2c2e; padding: 15px 20px; border-bottom: 2px solid var(--accent); position: sticky; top: 0; z-index: 100; }
        .tab-group { display: flex; gap: 10px; }
        .tab { flex: 1; padding: 12px; text-align: center; border-radius: 8px; font-weight: bold; background: #3a3a3c; color: var(--sub-text); }
        .tab.active { background: var(--accent); color: white; }

        .main-display { padding: 30px 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .target-date-box { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center; width: 100%; border: 1px solid #333; }
        .target-val { font-size: 1.3rem; font-family: monospace; }

        .timer-val { font-size: 5rem; font-weight: 200; font-family: monospace; line-height: 1; margin: 10px 0; }
        .frame-val { font-size: 1.1rem; color: var(--secondary); font-weight: 600; margin-bottom: 20px; }

        .offset-control { background: #1c1c2e; padding: 15px; border-radius: 12px; margin-bottom: 20px; width: 100%; border: 1px solid var(--secondary); }
        .adjust-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; }
        .adj-btn { background: #3a3a3c; color: white; padding: 15px 0; border-radius: 10px; font-weight: bold; font-size: 1rem; }

        .action-area { padding: 0 20px 30px; }
        .btn-start { background: var(--accent); color: white; width: 100%; padding: 20px; border-radius: 16px; font-size: 1.5rem; font-weight: bold; }
        .btn-stop { background: var(--danger); color: white; width: 100%; padding: 20px; border-radius: 16px; font-size: 1.5rem; font-weight: bold; }

        .preset-section { background: var(--card); margin: 0 15px 100px; padding: 20px; border-radius: 20px; border: 1px solid #333; }
        .date-select-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 15px 0; }
        select { background: #2c2c2e; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; font-size: 1rem; -webkit-appearance: none; text-align: center; }
        input[type="text"] { background: #2c2c2e; border: 1px solid #444; color: white; padding: 15px; border-radius: 8px; width: 100%; font-size: 1rem; margin-bottom: 10px; }
        
        .preset-item { background: #2c2c2e; padding: 18px; border-radius: 14px; margin-top: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #444; }
        .load-btn { background: var(--success); color: white; padding: 14px 24px; border-radius: 10px; font-weight: bold; font-size: 1rem; }
        .del-btn { color: var(--danger); font-size: 0.8rem; background: none; margin-top: 10px; padding: 5px 0; text-decoration: underline; text-align: left; display: block; width: fit-content; }
        .p-meta { font-size: 0.75rem; color: var(--sub-text); margin-top: 4px; line-height: 1.3; }
    </style>
</head>
<body>

<div class="header">
    <div class="tab-group"><div id="tab1" class="tab active" onclick="switchTimer(1)">TIMER 1</div><div id="tab2" class="tab" onclick="switchTimer(2)">TIMER 2</div></div>
</div>

<div class="main-display">
    <div class="target-date-box">
        <div style="font-size:0.7rem;color:var(--accent);font-weight:bold;" id="timer-label">TARGET CLOCK (TIMER 1)</div>
        <div id="target-view" class="target-val">---</div>
    </div>
    
    <div id="disp-ms" class="timer-val">00.00</div>
    <div id="disp-frame" class="frame-val">0 F</div>

    <div class="offset-control">
        <div style="font-size:0.75rem; color:var(--secondary); font-weight:bold; margin-bottom:10px; text-align:center;">GLOBAL OFFSET ADJUST</div>
        <div class="adjust-grid">
            <button class="adj-btn" onclick="adjOffset(-60)">-1s</button><button class="adj-btn" onclick="adjOffset(-15)">-15F</button>
            <button class="adj-btn" onclick="adjOffset(15)">+15F</button><button class="adj-btn" onclick="adjOffset(60)">+1s</button>
        </div>
    </div>
</div>

<div class="action-area"><button id="mainBtn" class="btn-start" onclick="toggleTimer()">START TIMER</button></div>

<div class="preset-section">
    <div style="color:var(--accent); font-weight:bold; margin-bottom:10px;">PRESET SAVE (T1 & T2 SET)</div>
    <input type="text" id="p-name" placeholder="セットの名前を入力">
    
    <div style="font-size:0.7rem; color:var(--sub-text); margin-top:10px;">編集中のタイマー日時:</div>
    <div class="date-select-group">
        <select id="sel-y" onchange="syncFromUI()"></select><select id="sel-mo" onchange="syncFromUI()"></select><select id="sel-d" onchange="syncFromUI()"></select>
        <select id="sel-h" onchange="syncFromUI()"></select><select id="sel-mi" onchange="syncFromUI()"></select><select id="sel-s" onchange="syncFromUI()"></select>
    </div>
    
    <button class="adj-btn" style="background:var(--secondary); width:100%;" onclick="savePreset()">T1・T2の両方をセットで保存</button>
    
    <div id="list"></div>
</div>

<script>
    let activeT = 1; let isRunning = false; let currentF = 0; let timerId = null; let lastT = 0; let audioCtx = null;
    const FPS = 60; const BEEP_TIMES = [2.0, 1.5, 1.0, 0.5, 0.0]; let soundedIndex = -1;

    let state = { 
        t1: { d: "2026/01/01 00:00:05", s: 5 }, 
        t2: { d: "2026/01/01 00:00:10", s: 10 } 
    };
    let globalOffset = 0;

    window.onload = () => {
        initSelects();
        globalOffset = parseInt(localStorage.getItem('rng_global_offset') || "0");
        loadPresets();
        updateUIFromState();
    };

    function initSelects() {
        const createOpts = (id, start, end, pad=false) => {
            const sel = document.getElementById(id);
            for(let i=start; i<=end; i++) {
                let opt = document.createElement('option');
                opt.value = opt.text = pad ? String(i).padStart(2, '0') : i;
                sel.add(opt);
            }
        };
        // Switch本体の設定可能範囲（2000年〜2060年）に同期
        createOpts('sel-y', 2000, 2060); 
        createOpts('sel-mo', 1, 12, true); createOpts('sel-d', 1, 31, true);
        createOpts('sel-h', 0, 23, true); createOpts('sel-mi', 0, 59, true); createOpts('sel-s', 0, 59, true);
        
        // 初期値として現在のシステム年をセット
        document.getElementById('sel-y').value = new Date().getFullYear();
    }

    function syncFromUI() {
        const y = document.getElementById('sel-y').value;
        const mo = document.getElementById('sel-mo').value;
        const d = document.getElementById('sel-d').value;
        const h = document.getElementById('sel-h').value;
        const mi = document.getElementById('sel-mi').value;
        const s = document.getElementById('sel-s').value;
        
        const dateStr = `${y}/${mo}/${d} ${h}:${mi}:${s}`;
        state['t' + activeT] = { d: dateStr, s: parseInt(s) };
        document.getElementById('target-view').innerText = dateStr;
        refreshTimerDisplay();
    }

    function updateUIFromState() {
        const target = state['t' + activeT];
        const parts = target.d.match(/(\d+)\/(\d+)\/(\d+) (\d+):(\d+):(\d+)/);
        if (parts) {
            document.getElementById('sel-y').value = parts[1];
            document.getElementById('sel-mo').value = parts[2];
            document.getElementById('sel-d').value = parts[3];
            document.getElementById('sel-h').value = parts[4];
            document.getElementById('sel-mi').value = parts[5];
            document.getElementById('sel-s').value = parts[6];
        }
        document.getElementById('target-view').innerText = target.d;
        document.getElementById('timer-label').innerText = "TARGET CLOCK (TIMER " + activeT + ")";
        refreshTimerDisplay();
    }

    function adjOffset(val) {
        if (isRunning) return;
        globalOffset += val;
        localStorage.setItem('rng_global_offset', globalOffset);
        refreshTimerDisplay();
    }

    function switchTimer(n) {
        if (isRunning) return;
        activeT = n;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab' + n).classList.add('active');
        updateUIFromState();
    }

    function refreshTimerDisplay() {
        const totalFrames = (state['t' + activeT].s * FPS) + globalOffset;
        updateDisplay(totalFrames);
    }

    function updateDisplay(f) {
        document.getElementById('disp-ms').innerText = Math.max(0, (f / FPS)).toFixed(2);
        document.getElementById('disp-frame').innerText = Math.floor(Math.max(0, f)) + " F (Offset: " + (globalOffset >= 0 ? "+" : "") + globalOffset + ")";
    }

    function playBeep(isFinal) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.type = isFinal ? 'square' : 'triangle';
        o.frequency.setValueAtTime(isFinal ? 1200 : 800, audioCtx.currentTime);
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + 0.1);
    }

    function toggleTimer() {
        if (isRunning) { stop(); return; }
        if (!audioCtx) audioCtx = new AudioContext();
        currentF = (state['t' + activeT].s * FPS) + globalOffset;
        isRunning = true; soundedIndex = -1;
        document.getElementById('mainBtn').innerText = "STOP TIMER";
        document.getElementById('mainBtn').className = "btn-stop";
        lastT = performance.now();
        timerId = requestAnimationFrame(tick);
    }

    function tick(now) {
        if (!isRunning) return;
        const delta = now - lastT;
        if (delta >= (1000 / FPS)) {
            currentF -= delta / (1000 / FPS);
            lastT = now;
            const currentSec = currentF / FPS;
            for (let i = 0; i < BEEP_TIMES.length; i++) {
                if (i > soundedIndex && currentSec <= BEEP_TIMES[i]) {
                    playBeep(BEEP_TIMES[i] === 0); soundedIndex = i;
                }
            }
            if (currentF <= 0) { stop(); return; }
            updateDisplay(currentF);
        }
        timerId = requestAnimationFrame(tick);
    }

    function stop() {
        isRunning = false; cancelAnimationFrame(timerId);
        document.getElementById('mainBtn').innerText = "START TIMER";
        document.getElementById('mainBtn').className = "btn-start";
        refreshTimerDisplay();
    }

    function savePreset() {
        const name = document.getElementById('p-name').value || "Unnamed Set";
        const newP = { 
            id: Date.now(), 
            name: name, 
            t1: JSON.parse(JSON.stringify(state.t1)), 
            t2: JSON.parse(JSON.stringify(state.t2)) 
        };
        let ps = JSON.parse(localStorage.getItem('rng_p_v11') || "[]");
        ps.push(newP);
        localStorage.setItem('rng_p_v11', JSON.stringify(ps));
        loadPresets();
    }

    function loadPresets() {
        const list = document.getElementById('list');
        try {
            let ps = JSON.parse(localStorage.getItem('rng_p_v11') || "[]");
            list.innerHTML = "";
            if (ps.length === 0) {
                list.innerHTML = '<div style="text-align:center; padding:20px; color:#555;">保存済みのセットはありません</div>';
                return;
            }
            ps.reverse().forEach(p => {
                const item = document.createElement('div');
                item.className = "preset-item";
                item.innerHTML = `<div style="flex:1; padding-right:10px;">
                    <strong>${p.name}</strong>
                    <div class="p-meta">T1: ${p.t1.d}</div>
                    <div class="p-meta">T2: ${p.t2.d}</div>
                    <button class="del-btn" onclick="deletePreset(${p.id})">このセットを削除</button>
                </div><button class="load-btn" onclick="applyPreset(${p.id})">LOAD</button>`;
                list.appendChild(item);
            });
        } catch (e) { }
    }

    function applyPreset(id) {
        let ps = JSON.parse(localStorage.getItem('rng_p_v11') || "[]");
        const p = ps.find(x => x.id === id);
        if (p) {
            state.t1 = p.t1; state.t2 = p.t2;
            updateUIFromState();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    function deletePreset(id) {
        if(!confirm("この設定セットを完全に削除してもよろしいですか？")) return;
        let ps = JSON.parse(localStorage.getItem('rng_p_v11') || "[]");
        ps = ps.filter(x => x.id !== id);
        localStorage.setItem('rng_p_v11', JSON.stringify(ps));
        loadPresets();
    }
</script>
</body>
</html>
